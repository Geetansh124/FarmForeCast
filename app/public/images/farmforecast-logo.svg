<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="#f5f1e8" stroke="none"/>
  
  <!-- Concentric circles (bottom) -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="#9ca89a" stroke-width="4" opacity="0.6"/>
  <circle cx="200" cy="200" r="130" fill="none" stroke="#9ca89a" stroke-width="3" opacity="0.5"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="#9ca89a" stroke-width="3" opacity="0.4"/>
  <circle cx="200" cy="200" r="110" fill="none" stroke="#9ca89a" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#9ca89a" stroke-width="2" opacity="0.2"/>
  
  <!-- WiFi/Signal waves (left - blue) -->
  <path d="M 140 120 Q 100 160 100 200" fill="none" stroke="#5b8fc4" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <path d="M 125 105 Q 70 155 70 200" fill="none" stroke="#5b8fc4" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  
  <!-- WiFi/Signal waves (right - orange) -->
  <path d="M 260 120 Q 300 160 300 200" fill="none" stroke="#d4a574" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <path d="M 275 105 Q 330 155 330 200" fill="none" stroke="#d4a574" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  
  <!-- WiFi/Signal waves (top - dark green) -->
  <path d="M 170 100 Q 200 70 230 100" fill="none" stroke="#2d5f3f" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <path d="M 150 80 Q 200 30 250 80" fill="none" stroke="#2d5f3f" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Weather elements group (left side) -->
  <!-- Snowflake -->
  <g opacity="0.7">
    <circle cx="110" cy="160" r="12" fill="none" stroke="#5b8fc4" stroke-width="1.5"/>
    <line x1="110" y1="148" x2="110" y2="172" stroke="#5b8fc4" stroke-width="1.5"/>
    <line x1="98" y1="160" x2="122" y2="160" stroke="#5b8fc4" stroke-width="1.5"/>
    <line x1="101" y1="151" x2="119" y2="169" stroke="#5b8fc4" stroke-width="1.5"/>
    <line x1="119" y1="151" x2="101" y2="169" stroke="#5b8fc4" stroke-width="1.5"/>
  </g>
  
  <!-- Water drop -->
  <path d="M 140 135 L 140 155 Q 140 165 135 170 Q 130 165 130 155 Q 130 145 135 135 Q 140 130 140 135" fill="#5b8fc4" opacity="0.7"/>
  
  <!-- Lightning bolt -->
  <path d="M 105 180 L 100 200 L 110 200 L 95 225 L 110 210 L 100 210 Z" fill="#f4a940" opacity="0.8"/>
  
  <!-- Field/Crop waves -->
  <path d="M 130 260 Q 150 250 170 260" fill="none" stroke="#2d5f3f" stroke-width="3" opacity="0.6"/>
  <path d="M 130 275 Q 150 265 170 275" fill="none" stroke="#2d5f3f" stroke-width="3" opacity="0.5"/>
  <path d="M 130 290 Q 150 280 170 290" fill="none" stroke="#2d5f3f" stroke-width="3" opacity="0.4"/>
  
  <!-- Phone/Device center -->
  <rect x="165" y="130" width="70" height="140" rx="8" fill="#2d5f3f" stroke="#2d5f3f" stroke-width="2"/>
  <rect x="170" y="138" width="60" height="115" rx="4" fill="#e8f0e8"/>
  
  <!-- Phone screen content -->
  <!-- Sun -->
  <circle cx="200" cy="155" r="8" fill="#f4a940"/>
  <!-- Cloud -->
  <path d="M 190 175 Q 185 170 180 170 Q 175 170 175 175 Q 175 180 180 180 L 220 180 Q 225 180 225 175 Q 225 170 220 170 Q 215 170 210 175" fill="#d0d0d0" opacity="0.8"/>
  <!-- Rain drops -->
  <circle cx="190" cy="190" r="2" fill="#5b8fc4"/>
  <circle cx="200" cy="195" r="2" fill="#5b8fc4"/>
  <circle cx="210" cy="190" r="2" fill="#5b8fc4"/>
  
  <!-- Weather text on phone -->
  <text x="200" y="225" font-size="10" font-weight="bold" fill="#2d5f3f" text-anchor="middle">7-Day 21°C</text>
  <text x="200" y="237" font-size="8" fill="#2d5f3f" text-anchor="middle">Rain</text>
  
  <!-- Phone home indicator -->
  <rect x="185" y="250" width="30" height="2" rx="1" fill="#2d5f3f" opacity="0.5"/>
  
  <!-- Cloud (right side) -->
  <path d="M 280 160 Q 275 155 270 155 Q 265 155 265 160 Q 265 165 270 165 L 305 165 Q 310 165 310 160 Q 310 155 305 155 Q 300 155 295 160" fill="white" stroke="#2d5f3f" stroke-width="2" opacity="0.8"/>
  
  <!-- Bottom field element -->
  <path d="M 230 260 Q 250 250 270 260" fill="none" stroke="#2d5f3f" stroke-width="3" opacity="0.6"/>
  <path d="M 230 275 Q 250 265 270 275" fill="none" stroke="#2d5f3f" stroke-width="3" opacity="0.5"/>
  <path d="M 230 290 Q 250 280 270 290" fill="none" stroke="#2d5f3f" stroke-width="3" opacity="0.4"/>
  
  <!-- Brand name below -->
  <text x="200" y="340" font-size="48" font-weight="600" font-family="Arial, sans-serif" fill="#2d5f3f" text-anchor="middle" letter-spacing="1">Farmforecast</text>
</svg>