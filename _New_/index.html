<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArborZen AI</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN for immediate preview rendering -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
            colors: {
              nature: {
                50: '#f0fdf4',
                100: '#dcfce7',
                200: '#bbf7d0',
                300: '#86efac',
                400: '#4ade80',
                500: '#22c55e',
                600: '#16a34a',
                700: '#15803d',
                800: '#166534',
                900: '#14532d',
                950: '#052e16',
              }
            },
            animation: {
              'sway': 'sway 3s ease-in-out infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'fade-in': 'fadeIn 0.8s ease-out',
              'slide-up': 'slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'slide-right': 'slideRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'float': 'float 6s ease-in-out infinite',
              'float-slow': 'float 10s ease-in-out infinite',
              'float-delayed': 'float 8s ease-in-out 4s infinite',
              'flow': 'flow 2s linear infinite',
              'blob': 'blob 7s infinite',
              'shimmer': 'shimmer 2.5s linear infinite',
              'spin-slow': 'spin 12s linear infinite',
              'struggle': 'struggle 0.5s infinite linear',
              'slide-in-left': 'slideInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            },
            keyframes: {
              sway: {
                '0%, 100%': { transform: 'rotate(-3deg)' },
                '50%': { transform: 'rotate(3deg)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(40px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              slideRight: {
                '0%': { transform: 'translateX(-40px)', opacity: '0' },
                '100%': { transform: 'translateX(0)', opacity: '1' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              flow: {
                '0%': { strokeDashoffset: '20' },
                '100%': { strokeDashoffset: '0' },
              },
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '-1000px 0' },
                '100%': { backgroundPosition: '1000px 0' },
              },
              struggle: {
                '0%, 100%': { transform: 'translate(0, 0) rotate(0deg)' },
                '10%': { transform: 'translate(-1px, -1px) rotate(-1deg)' },
                '20%': { transform: 'translate(1px, 1px) rotate(1deg)' },
                '30%': { transform: 'translate(-2px, 2px) rotate(0deg)' },
                '40%': { transform: 'translate(2px, -2px) rotate(1deg)' },
                '50%': { transform: 'translate(-1px, 1px) rotate(-1deg)' },
                '60%': { transform: 'translate(1px, -1px) rotate(0deg)' },
                '70%': { transform: 'translate(-2px, 1px) rotate(-1deg)' },
                '80%': { transform: 'translate(2px, -1px) rotate(1deg)' },
                '90%': { transform: 'translate(-1px, -2px) rotate(0deg)' }
              },
              slideInLeft: {
                '0%': { transform: 'translateX(-100px)', opacity: '0' },
                '100%': { transform: 'translateX(0)', opacity: '1' }
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Utilities usually handled by CSS file */
      .glass {
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(226, 232, 240, 1);
      }
      .dark .glass {
        background: rgba(20, 83, 45, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .glass-dark {
        background: rgba(20, 83, 45, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .perspective-1000 {
        perspective: 1000px;
      }
      .preserve-3d {
        transform-style: preserve-3d;
      }
      .rotate-y-12 {
        transform: rotateY(12deg);
      }
      body {
        overflow-x: hidden;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.1",
    "vite": "https://aistudiocdn.com/vite@^7.2.6",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root">
      <!-- Initial Loading UI -->
      <div style="height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); color: #16a34a;">
        <div style="position: relative; width: 80px; height: 80px;">
          <div style="position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 4px solid #bbf7d0; border-top-color: #22c55e; animation: spin 1s linear infinite;"></div>
        </div>
        <p style="margin-top: 1.5rem; font-family: sans-serif; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; font-size: 0.875rem;">Initializing ArborZen AI</p>
      </div>
      <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      </style>
    </div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
